<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ExamGuard-AI | Secure Assessment Suite{% endblock %}</title>
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Global Design System Theme CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  
  {% block head %}{% endblock %}
</head>
<body>
  
  {% block content %}{% endblock %}
  
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Global Session Inactivity Security Tracker -->
  {% if session.get('user_email') %}
  <script>
    (function() {
      // 15 minutes = 15 * 60 * 1000 milliseconds
      const INACTIVITY_TIMEOUT = 15 * 60 * 1000; 
      let idleTimer;

      function terminateSessionRedirect() {
        alert("Session expired due to 15 minutes of inactivity. Please re-authenticate.");
        window.location.href = '/logout'; 
      }

      function resetIdleCountdown() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(terminateSessionRedirect, INACTIVITY_TIMEOUT);
      }

      // Track interaction signals across the window viewport
      window.addEventListener('load', resetIdleCountdown);
      window.addEventListener('mousemove', resetIdleCountdown);
      window.addEventListener('mousedown', resetIdleCountdown); 
      window.addEventListener('keypress', resetIdleCountdown);
      window.addEventListener('scroll', resetIdleCountdown);
      window.addEventListener('touchstart', resetIdleCountdown);
    })();
  </script>
  {% endif %}
  
  {% block scripts %}{% endblock %}
</body>
</html>
